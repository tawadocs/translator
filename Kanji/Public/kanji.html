<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tawish Kanji | View Mode</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #06080e;
                --card: #10141f;
                --accent: #4f46e5;
            }
            body {
                background: radial-gradient(
                    circle at 50% 0%,
                    #161b2e 0%,
                    #06080e 100%
                );
                color: #e2e8f0;
                font-family: "Plus Jakarta Sans", sans-serif;
                min-height: 100vh;
            }
            .kanji-card {
                background: var(--card);
                border: 1px solid rgba(255, 255, 255, 0.03);
                transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            }
            .kanji-card:hover {
                transform: translateY(-4px);
                border-color: rgba(129, 140, 248, 0.3);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            }
        </style>
    </head>
    <body class="p-6 md:p-10">
        <div class="max-w-[1700px] mx-auto">
            <header
                class="grid grid-cols-1 md:grid-cols-3 items-center mb-16 gap-6"
            >
                <div class="flex justify-start">
                    <a
                        href="/"
                        class="group flex items-center gap-2 text-slate-500 hover:text-white transition-all"
                    >
                        <div
                            class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center group-hover:border-indigo-500/50 group-hover:bg-indigo-500/10 transition-colors"
                        >
                            <svg
                                class="w-4 h-4"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2.5"
                                    d="M15 19l-7-7 7-7"
                                />
                            </svg>
                        </div>
                        <span
                            class="text-xs font-bold uppercase tracking-widest"
                            >Back</span
                        >
                    </a>
                </div>

                <div class="flex items-center justify-center gap-3">
                    <div
                        class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20"
                    >
                        <span class="text-white font-bold text-xl">漢</span>
                    </div>
                    <h1
                        class="text-3xl font-extrabold tracking-tighter text-white"
                    >
                        Tawish<span class="text-indigo-400">KANJI</span>
                    </h1>
                </div>

                <div class="flex justify-end">
                    <div class="relative w-full max-w-xs">
                        <input
                            type="text"
                            id="search"
                            placeholder="Search meanings, kanji..."
                            oninput="renderGrid()"
                            class="w-full bg-[#10141f] border border-white/5 rounded-full px-6 py-3 text-sm outline-none focus:border-indigo-500/50 transition-all text-white"
                        />
                    </div>
                </div>
            </header>

            <div
                id="grid"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6"
            ></div>
        </div>

        <script>
            let kanjiData = [];

            async function loadData() {
                try {
                    const res = await fetch("/api/kanji");
                    kanjiData = await res.json();
                    renderGrid();
                } catch (e) {
                    console.error("API Error:", e);
                }
            }

            function renderGrid() {
                const q = document.getElementById("search").value.toLowerCase();
                const grid = document.getElementById("grid");

                const filtered = kanjiData.filter(
                    (k) =>
                        k.Radical.includes(q) ||
                        (k.Alias || "").toLowerCase().includes(q) ||
                        k.Definitions.some((d) => d.toLowerCase().includes(q)),
                );

                grid.innerHTML = filtered
                    .map(
                        (item) => `
                    <div class="kanji-card rounded-3xl p-8 flex flex-col">
                        <div class="flex items-baseline gap-3 mb-8">
                            <div class="text-4xl font-light text-white">${item.Radical}</div>
                            <div class="text-sm font-medium text-slate-500 uppercase tracking-widest">${item.Readings.Romaji}</div>
                        </div>

                        <div class="text-indigo-400 font-bold text-sm mb-2 truncate">
                            ${item.Alias || item.Readings.Japanese}
                        </div>

                        <div class="text-white font-semibold text-lg leading-tight mb-4 flex-grow">
                            ${item.Definitions.join(", ")}
                        </div>
                    </div>
                `,
                    )
                    .join("");
            }

            loadData();
        </script>
    </body>
</html>
